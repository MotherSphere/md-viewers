<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MD Viewer</title>
  <link rel="stylesheet" href="vendor/highlight/github.min.css" id="hljs-light">
  <link rel="stylesheet" href="vendor/highlight/github-dark.min.css" id="hljs-dark" disabled>
  <link rel="stylesheet" href="vendor/katex/katex.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header id="toolbar">
    <button id="open-btn" title="Ouvrir un fichier (Ctrl+O)">📂 Ouvrir</button>
    <button id="toc-btn" title="Table des matières">☰ Sommaire</button>
    <span id="filename">Aucun fichier</span>
    <button id="theme-btn" title="Mode sombre (Ctrl+D)">🌙</button>
  </header>

  <aside id="toc-panel" class="hidden">
    <div class="toc-title">Table des matières</div>
    <nav id="toc-nav"></nav>
  </aside>

  <main id="main">
    <div id="drop-hint">
      <div class="hint-icon">📄</div>
      <div class="hint-title">Glissez un fichier <code>.md</code> ici</div>
      <div class="hint-sub">ou cliquez sur « 📂 Ouvrir » dans la barre du haut</div>
    </div>
    <article id="content" class="markdown-body"></article>
  </main>

  <script src="vendor/highlight/highlight.min.js"></script>
  <script src="vendor/katex/katex.min.js"></script>
  <script src="vendor/mermaid/mermaid.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
