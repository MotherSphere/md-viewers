name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ''
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''
          - name: macOS Intel
            os: macos-13
            target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'
          - name: macOS Apple Silicon
            os: macos-latest
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.platform.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build Tauri app (Windows — no installer, raw .exe only)
        if: runner.os == 'Windows'
        run: cargo tauri build --no-bundle ${{ matrix.platform.args }}

      - name: Build Tauri app (Linux + macOS — with bundling)
        if: runner.os != 'Windows'
        run: cargo tauri build ${{ matrix.platform.args }}

      - name: Rename Windows portable exe
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p release-out
          cp "src-tauri/target/release/md-viewer.exe" "release-out/MD-Viewer-portable.exe"
          ls -lh release-out/

      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: md-viewer-linux-x64
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn
          retention-days: 30

      - name: Upload artifacts (Windows — portable)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: md-viewer-windows-portable
          path: release-out/MD-Viewer-portable.exe
          if-no-files-found: error
          retention-days: 30

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: md-viewer-macos-${{ matrix.platform.target }}
          path: |
            src-tauri/target/${{ matrix.platform.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.platform.target }}/release/bundle/macos/*.app.tar.gz
          if-no-files-found: warn
          retention-days: 30

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact tree
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.AppImage" -o -name "*.deb" -o -name "*.exe" -o -name "*.dmg" \) -exec cp {} release/ \;
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true
          name: MD Viewer ${{ github.ref_name }}
