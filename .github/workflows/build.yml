name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ''
            artifact_name: md-viewer-linux-x64
            binary_src: src-tauri/target/release/md-viewer
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''
            artifact_name: md-viewer-windows-x64.exe
            binary_src: src-tauri/target/release/md-viewer.exe
          - name: macOS Intel
            os: macos-latest
            target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'
            artifact_name: md-viewer-macos-x64
            binary_src: src-tauri/target/x86_64-apple-darwin/release/md-viewer
          - name: macOS Apple Silicon
            os: macos-latest
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
            artifact_name: md-viewer-macos-arm64
            binary_src: src-tauri/target/aarch64-apple-darwin/release/md-viewer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.platform.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build Tauri app (raw binary, no bundle)
        run: cargo tauri build --no-bundle ${{ matrix.platform.args }}

      - name: Stage raw binary
        shell: bash
        run: |
          mkdir -p release-out
          cp "${{ matrix.platform.binary_src }}" "release-out/${{ matrix.platform.artifact_name }}"
          if [ "${{ runner.os }}" != "Windows" ]; then
            chmod +x "release-out/${{ matrix.platform.artifact_name }}"
          fi
          ls -lh release-out/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: release-out/${{ matrix.platform.artifact_name }}
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish release
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact tree
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -lh release/

      - name: Compute release metadata
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "name=MD Viewer ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            short_sha="${GITHUB_SHA::7}"
            echo "tag=build-${short_sha}" >> "$GITHUB_OUTPUT"
            echo "name=MD Viewer build ${short_sha}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          fail_on_unmatched_files: true
